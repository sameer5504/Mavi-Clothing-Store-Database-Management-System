<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mavi Palestine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div class="auth">


    <div class="auth-header">
        <img src="{{ url_for('static', filename='images/mavi-seeklogo.png') }}" class="auth-logo" alt="Mavi Logo">

    </div>


    <div class="login-box">
        <h2>Login</h2>
        <p class="helper-text">Please enter your credentials to continue</p>

        {% if error %}
            <p style="color:red; font-size:14px; margin-bottom:10px;">
                {{ error }}
            </p>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <select name="login_type" required>
                <option value="">Select Login Type</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>

            <input type="text" name="username" placeholder="Enter Username" required>
            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit" class="btn btn-solid">Login</button>
        </form>
    </div>

</div>

<footer>
    2025 Mavi Palestine — Internal Access Only
</footer>

</body>
</html>
